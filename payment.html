<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서류대리님 - 실비 결제</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 32px 28px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .logo { font-size: 13px; color: #888; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.6; }
    .info-box { background: #f8f9fa; border-radius: 10px; padding: 18px; margin-bottom: 24px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #444; padding: 5px 0; }
    .info-row .label { color: #888; }
    .info-row.total { border-top: 1px solid #e0e0e0; margin-top: 10px; padding-top: 14px; font-weight: 700; font-size: 17px; color: #1a1a1a; }
    .info-row.total .amount { color: #2563eb; }
    .bank-box { background: #EEF2FF; border: 1.5px solid #C7D2FE; border-radius: 12px; padding: 22px; margin-bottom: 20px; text-align: center; }
    .bank-label { font-size: 11px; color: #6366F1; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px; }
    .bank-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .bank-account { font-size: 24px; font-weight: 800; color: #1a1a1a; letter-spacing: .03em; margin-bottom: 4px; }
    .bank-holder { font-size: 13px; color: #666; margin-bottom: 16px; }
    .bank-amount { font-size: 18px; font-weight: 800; color: #1e1b4b; }
    .copy-btn { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .copy-btn:active { background: #1d4ed8; }
    .notice { font-size: 12px; color: #aaa; text-align: center; margin-top: 12px; line-height: 1.6; }
    .error-screen { display: none; text-align: center; padding: 20px 0; }
    .result-icon { font-size: 56px; margin-bottom: 16px; }
    .result-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .result-msg { font-size: 14px; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">

  <div id="payScreen">
    <div class="logo">서류대리님</div>
    <h1>실비 청구 서류 대행</h1>
    <p class="desc">서류 수령이 완료되었습니다.<br>아래 계좌로 입금해 주세요.</p>

    <div class="info-box">
      <div class="info-row"><span class="label">고객명</span><span id="dispName">-</span></div>
      <div class="info-row"><span class="label">주문번호</span><span id="dispOrderId" style="font-size:12px;color:#888;">-</span></div>
      <div class="info-row total"><span class="label">입금 금액</span><span class="amount" id="dispAmount">-</span></div>
    </div>

    <div class="bank-box">
      <div class="bank-label">입금 계좌</div>
      <div class="bank-name">IBK기업은행</div>
      <div class="bank-account" id="accountNum">523-082856-04-011</div>
      <div class="bank-holder">예금주: 배승휴(서류대리님)</div>
      <div class="bank-amount" id="dispAmount2">-</div>
    </div>

    <button class="copy-btn" onclick="copyAccount()">계좌번호 복사</button>

    <p class="notice">입금 확인 후 서류를 카카오채널로 전달해 드립니다<br>문의: 카카오채널 <a href="http://pf.kakao.com/_XxjhEX" style="color:#6366F1;">서류대리님</a></p>
  </div>

  <div class="error-screen" id="errorScreen">
    <div class="result-icon">⚠️</div>
    <div class="result-title">잘못된 링크입니다</div>
    <div class="result-msg">배대리에게 링크를 다시 요청해 주세요.</div>
  </div>
</div>

<script>
var params  = new URLSearchParams(window.location.search);
var orderId = params.get('order_id');
var amount  = parseInt(params.get('amount'), 10);
var name    = params.get('name') || '고객';

if (!orderId || isNaN(amount) || amount < 100) {
  document.getElementById('payScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'block';
} else {
  document.getElementById('dispName').textContent = name;
  document.getElementById('dispOrderId').textContent = orderId;
  document.getElementById('dispAmount').textContent = amount.toLocaleString('ko-KR') + '원';
  document.getElementById('dispAmount2').textContent = amount.toLocaleString('ko-KR') + '원';
}

function copyAccount() {
  var acc = document.getElementById('accountNum').textContent.replace(/[^0-9]/g, '');
  navigator.clipboard.writeText(acc).then(function() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '복사 완료 ✓';
    btn.style.background = '#16a34a';
    setTimeout(function() { btn.textContent = '계좌번호 복사'; btn.style.background = '#2563eb'; }, 2000);
  }).catch(function() {
    prompt('계좌번호를 복사하세요:', acc);
  });
}
</script>
</body>
</html>
